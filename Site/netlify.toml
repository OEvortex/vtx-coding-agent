[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Redirects are in public/_redirects (single source of truth so we can version them).
# Headers and caching rules live here in netlify.toml.

# -------------------------------------------------------------------
# Security + performance headers (applied to every served response)
# -------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    X-XSS-Protection = "0"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    # Content-Security-Policy scoped to self + Netlify API; unsafe-inline is
    # needed for Tailwind v4's inline styles and motion-library runtime CSS.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.netlify.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Long cache for fingerprinted assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prerendered route folders: serve index.html with HTML cache
[[headers]]
  for = "/features/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/docs/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Sitemap + robots: short cache with correct content-type
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

