meta:
  config_version: 10

llm:
  default_provider: "openai-codex"
  default_model: "gpt-5.5"
  default_base_url: ""
  default_thinking_level: "low"
  tool_call_idle_timeout_seconds: 180
  request_timeout_seconds: 600

  auth:
    openai_compat: "auto"
    anthropic_compat: "auto"

  tls:
    insecure_skip_verify: false

  system_prompt:
    git_context: true
    # Base identity + general rules. Defaults to vtx.prompts.identity.DEFAULT_VTX_BASE
    # (sourced from Python). Set a custom string here to override the base prompt;
    # extra sections (tool guidelines, AGENTS.md, skills, git, env) are still
    # appended automatically.
    content: ""

compaction:
  on_overflow: "continue"
  threshold_percent: 80

agent:
  max_turns: 500
  default_context_window: 200000

ui:
  theme: "gruvbox-dark"
  collapse_thinking: true
  show_welcome_shortcuts: true
  hidden_models: []
  model_provider_filter: ""

permissions:
  mode: "prompt"

notifications:
  enabled: false
  volume: 0.5

# Extensions: Python files or packages that hook into vtx at startup.
# Each entry is a path to a ``.py`` file or a package directory containing
# ``__init__.py``. Auto-discovered paths (``.vtx/extensions/`` and
# ``~/.vtx/agent/extensions/``) are always loaded unless ``--no-extensions``
# is passed on the CLI; entries below are additive.
#
# Example:
#   extensions:
#     - ~/.vtx/extensions/permission_gate.py
#     - ./tools/vtx-extensions/audit-logger/
extensions: []

# Switchable handoff agents (``.vtx/agent/<name>.py``). Auto-discovered
# paths (``<cwd>/.vtx/agent/`` walked to the git root, and
# ``~/.vtx/agent/``) are always loaded; entries below are additive.
#
# ``default`` is the agent activated at session start when ``--agent`` /
# ``VTX_AGENT`` is not set. Empty string = no agent active.
# ``switch_mode`` controls how Shift+Tab / ``/agent <name>`` behaves.
#
# Example:
#   agents:
#     default: code-review
#     switch_mode: lock
#     files:
#       - ./team_agents/security_audit.py
agents:
  default: ""
  switch_mode: "lock"
  files: []

# Built-in sub-agent presets for the ``Task`` tool (``subagent_type``
# parameter). The ``Task`` tool delegates work to a fresh sub-agent; the
# LLM picks a preset by name. A user-defined agent from
# ``.vtx/agent/<name>.py`` always wins over a preset of the same name.
#
# Each preset accepts the user-facing subset of an AgentDef:
#   - description: shown to the LLM in the tool's docs
#   - instructions: prepended/appended to the sub-agent's system prompt
#   - instructions_mode: "append" (default) or "replace"
#   - tools_allow / tools_deny: tool surface filter (allow intersects, deny
#       subtracts; if allow is empty/None, all built-in tools are eligible)
#   - model: optional model override for the sub-agent
#   - thinking_level: optional thinking level override
#   - max_turns: optional turn budget
task:
  subagent_presets:
    - name: general-purpose
      description: Balanced sub-agent for delegating well-scoped tasks. Has
        the full built-in tool set and the same default instructions as the
        parent agent. Use when no specialised preset fits.
      tools_allow: []
      max_turns: 200
    - name: Explore
      description: Read-only repository exploration agent. Searches files
        and code; never modifies anything. Use for investigating
        unfamiliar code, mapping a codebase, or gathering context.
      instructions: |
        You are an exploration agent. You cannot modify the filesystem —
        only read and search. Be thorough but concise. When you have found
        what was asked, stop and report back.
      tools_allow: [read, find, skill, fetch_webpage, web_search]
      max_turns: 100
    - name: Plan
      description: Read-only planning agent. Investigates the codebase and
        produces a concrete plan; never writes code or makes changes.
      instructions: |
        You are a planning agent. Investigate the codebase, then produce a
        concrete step-by-step plan. Do not modify any files. Prefer
        existing code paths over new abstractions. The plan should be
        detailed enough that another agent can execute it without further
        questions.
      tools_allow: [read, find, skill, fetch_webpage, web_search]
      max_turns: 100

# Example: DeepSeek provider
# export DEEPSEEK_API_KEY="sk-your-api-key"
#
# Then set in [llm]:
# default_provider = "deepseek"
# default_model = "deepseek-v4-flash"
